services:
  - type: web
    name: inkflow-ai
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: corepack enable && yarn install --immutable && yarn build
    startCommand: yarn start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NODE_ENV
        value: production
